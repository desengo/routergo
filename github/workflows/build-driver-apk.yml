name: Build Driver APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      - name: Install Bubblewrap CLI
        run: npm i -g @bubblewrap/cli

      - name: Generate debug keystore (CI)
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # IMPORTANTE:
      # Troque o DOMAIN abaixo para o seu domínio final (ex: routergo.netlify.app)
      # e confirme que seu manifest está acessível em: https://SEU_DOMINIO/manifest.webmanifest
      - name: Init TWA project (no repo)
        run: |
          bubblewrap init --yes \
            --manifest https://routergo.netlify.app/manifest.webmanifest \
            --directory twa \
            --packageId app.routergo.driver \
            --name "RouterGo Entregador" \
            --launcherName "RouterGo" \
            --startUrl /driver \
            --iconUrl https://routergo.netlify.app/icons/icon-512.png \
            --signingKeyPath ../debug.keystore \
            --signingKeyAlias androiddebugkey \
            --signingKeyPassword android \
            --signingKeyStorePassword android

      - name: Build APK (release)
        working-directory: twa
        run: bubblewrap build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: routergo-driver-apk
          path: |
            twa/app/build/outputs/apk/release/*.apk
            twa/app/build/outputs/apk/debug/*.apk