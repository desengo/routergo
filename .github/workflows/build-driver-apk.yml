name: Build Driver APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Init TWA project (non-interactive)
        shell: bash
        run: |
          set -e
          # Responde:
          # 1) "n" = NÃO instalar JDK
          # 2) caminho do JDK 17 já instalado pelo actions/setup-java
          printf "n\n%s\n" "$JAVA_HOME" | bubblewrap init \
            --manifest https://routergo.netlify.app/manifest.webmanifest \
            --directory twa \
            --packageId app.routergo.driver \
            --name "RouterGo Entregador" \
            --launcherName "RouterGo" \
            --startUrl https://routergo.netlify.app/driver \
            --iconUrl https://routergo.netlify.app/icons/icon-512.png \
            --signingKeyPath ../debug.keystore \
            --signingKeyAlias androiddebugkey \
            --signingKeyPassword android \
            --signingKeyStorePassword android \
            --skipPwaValidation/
            --jdkPath "$JAVA_HOME" \
            --yes

      - name: Build APK
        working-directory: twa
        run: bubblewrap build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: routergo-driver-apk
          path: twa/app/build/outputs/apk/**/*.apk