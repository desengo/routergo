name: Build Driver APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

      - name: Init TWA project
        run: |
          rm -rf twa
          npx @bubblewrap/cli init \
          --skipPwaValidation \
          --manifest https://routergo.netlify.app/manifest.webmanifest \
          --directory twa \
          --packageId app.routergo.driver \
          --name "RouterGo Entregador" \
          --launcherName "RouterGo" \
          --startUrl https://routergo.netlify.app/driver \
          --iconUrl https://i.ibb.co/Cp5xwFPP/file-000000003124720e9a00b2b076c59c0c.png \
          --signingKeyPath debug.keystore \
          --signingKeyAlias androiddebugkey \
          --signingKeyPassword android \
          --signingKeyStorePassword android

      - name: Build APK
        working-directory: twa
        run: npx @bubblewrap/cli build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: routergo-driver-apk
          path: twa/app/build/outputs/apk/**/*.apk