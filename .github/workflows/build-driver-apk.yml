name: Build Driver APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Bubblewrap CLI + expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get update
          sudo apt-get install -y expect

      - name: Preconfigure Bubblewrap
        run: |
          bubblewrap updateConfig --jdkPath="$JAVA_HOME"
          bubblewrap updateConfig --androidSdkPath="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Init TWA project
        shell: bash
        run: |
          rm -rf twa
          expect << EOF
          set timeout -1
          spawn bubblewrap init --yes --skipPwaValidation \
            --manifest https://routergo.netlify.app/manifest.webmanifest \
            --directory twa \
            --packageId app.routergo.driver \
            --name "RouterGo Entregador" \
            --launcherName "RouterGo" \
            --startUrl https://routergo.netlify.app/driver \
            --iconUrl https://i.ibb.co/Cp5xwFPP/file-000000003124720e9a00b2b076c59c0c.png \
            --signingKeyPath ../debug.keystore \
            --signingKeyAlias androiddebugkey \
            --signingKeyPassword android \
            --signingKeyStorePassword android

          expect {
            -re "Do you want Bubblewrap to install the JDK.*" {
              send "n\r"
              exp_continue
            }
            -re "Path to your existing JDK 17:.*" {
              send "$env(JAVA_HOME)\r"
              exp_continue
            }
            eof
          }
          EOF

      - name: Build APK
        working-directory: twa
        run: bubblewrap build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: routergo-driver-apk
          path: twa/app/build/outputs/apk/**/*.apk